<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Atlas hero background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#312e81"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- base gradient -->
  <rect width="1600" height="500" fill="url(#bg)"/>
  <!-- dot grid texture -->
  <rect width="1600" height="500" fill="url(#dots)"/>

  <!-- soft glows -->
  <circle cx="1250" cy="120" r="360" fill="url(#glow)"/>
  <circle cx="250" cy="430" r="300" fill="url(#glow)"/>

  <!-- abstract translucent shapes -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="1380" cy="380" r="160"/>
    <circle cx="120" cy="80" r="110"/>
  </g>
  <g stroke="#93c5fd" stroke-width="2" fill="none" opacity="0.25">
    <path d="M0 360 C 300 300, 520 420, 820 340 S 1300 260, 1600 330"/>
    <path d="M0 410 C 320 360, 560 470, 860 390 S 1320 320, 1600 380"/>
  </g>

  <!-- stylized "A" mark, large and faint -->
  <g transform="translate(740 150)" opacity="0.12" stroke="#ffffff" stroke-width="10" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M60 10 L110 200 L10 200 Z"/>
    <line x1="33" y1="150" x2="87" y2="150"/>
  </g>
</svg>
